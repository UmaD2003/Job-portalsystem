{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .hero {
            height: 100vh;
            background: url("{% static 'images/job-bg.png' %}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero-content {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 10px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .btn {
    padding: 12px 25px;
    background-color: #0d6efd;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 18px;
}

.btn:hover {
    background-color: #084298;
}
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-content">
        <h1>Welcome to Job Portal</h1>
        <p>Find Your Dream Job Today</p>
        <a href="{% url 'job_list' %}" class="btn">Browse Jobs</a>
    </div>
</div>

</body>
</html>
