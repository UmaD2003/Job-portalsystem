<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
        }

        .box{
            width:400px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:#0077b6;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:10px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Admin Login</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username">

        <label>Password</label>
        <input type="password" name="password">

        <button type="submit">Admin Login</button>

    </form>

</div>

</body>
</html>
